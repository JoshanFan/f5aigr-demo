name: Mirror to Public Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    name: Mirror to JoshanFan/f5aigr-demo
    runs-on: [self-hosted, GRunner-21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private files and swap credentials
        env:
          PUBLIC_DEMO_USERNAME: ${{ secrets.PUBLIC_DEMO_USERNAME }}
          PUBLIC_DEMO_PASSWORD: ${{ secrets.PUBLIC_DEMO_PASSWORD }}
        run: |
          rm -rf .github/workflows/deploy.yml
          rm -rf .github/workflows/mirror.yml
          rm -f frontend.pen
          sed -i 's/const DEMO_USERNAME = ".*"/const DEMO_USERNAME = "'"$PUBLIC_DEMO_USERNAME"'"/' auth-utils.js
          sed -i 's/const DEMO_PASSWORD = ".*"/const DEMO_PASSWORD = "'"$PUBLIC_DEMO_PASSWORD"'"/' auth-utils.js
          sed -i "s/\`admin\` \/ \`F5aidemo\`/\`$PUBLIC_DEMO_USERNAME\` \/ \`$PUBLIC_DEMO_PASSWORD\`/g" README.md

      - name: Push to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "mirror: sync from private repo"
          git remote remove public 2>/dev/null || true
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/JoshanFan/f5aigr-demo.git
          git push public main --force
