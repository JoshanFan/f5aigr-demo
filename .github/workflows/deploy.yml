name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: harbor21.int.xxlab.run
  IMAGE_PROJECT: f5aigr-demo
  IMAGE_NAME: f5aigr-demo
  DEPLOY_HOST: 172.21.70.72

jobs:
  test:
    name: Test
    runs-on: [self-hosted, GRunner-21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: |
          node --check app.js
          node --check nginx/orchestrator.js

      - name: Unit tests
        run: node --test scan-utils.test.js nginx/orchestrator.test.js

  build_push:
    name: Build and Push Image
    runs-on: [self-hosted, GRunner-21]
    needs: test
    permissions:
      contents: read
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image vars
        id: vars
        run: |
          echo "image_repo=${IMAGE_REGISTRY}/${IMAGE_PROJECT}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repo }}:latest

  deploy:
    name: Deploy to 172.21.70.72
    runs-on: [self-hosted, GRunner-21]
    needs: build_push
    if: ${{ always() && needs.build_push.result == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: HARBOR_USERNAME,HARBOR_PASSWORD
          script: |
            set -eu
            IMAGE_REPO="${{ needs.build_push.outputs.image_repo }}"
            IMAGE_TAG="${{ needs.build_push.outputs.image_tag }}"

            echo "$HARBOR_PASSWORD" | docker login ${{ env.IMAGE_REGISTRY }} -u "$HARBOR_USERNAME" --password-stdin
            docker pull "$IMAGE_REPO:$IMAGE_TAG"

            docker rm -f f5aigr-demo 2>/dev/null || true
            docker rm -f f5aigr-demo-f5ai-demo-1 2>/dev/null || true

            docker run -d \
              --name f5aigr-demo \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE_REPO:$IMAGE_TAG"

            docker image prune -f
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
