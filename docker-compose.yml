services:
  f5ai-demo:
    build: .
    image: f5ai-guardrails-demo:latest
    ports:
      - "${HOST_PORT:-3000}:${NGINX_LISTEN_PORT:-3000}"
    environment:
      NGINX_LISTEN_PORT: "${NGINX_LISTEN_PORT:-3000}"
      GUARDRAILS_UPSTREAM: "${GUARDRAILS_UPSTREAM:-http://127.0.0.1:65535}"
    restart: unless-stopped
